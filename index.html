<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garuda AI Market 2.0</title>
    <style>
        body { background: #000; color: #00f2ff; font-family: sans-serif; margin: 0; text-align: center; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        .header { padding: 15px; border-bottom: 2px solid #00f2ff; background: #050505; box-shadow: 0 0 10px #00f2ff; }
        .orb { width: 90px; height: 90px; border: 3px solid #00f2ff; border-radius: 50%; margin: 25px auto; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 25px #00f2ff; transition: 0.4s; font-size: 14px; }
        .btn-mic { background: #00f2ff; color: #000; border: none; padding: 20px 50px; border-radius: 50px; font-weight: bold; font-size: 18px; cursor: pointer; margin-bottom: 10px; box-shadow: 0 0 20px rgba(0,242,255,0.4); outline: none; }
        .btn-mic:active { transform: scale(0.95); background: #fff; }
        #res-box { width: 92%; background: #0a1a1a; border: 1px solid #00f2ff; padding: 15px; margin: 10px auto; border-radius: 12px; min-height: 60px; color: #fff; text-align: left; font-size: 15px; box-shadow: inset 0 0 15px #000; border-left: 5px solid #00f2ff; line-height: 1.4; }
        #chart { width: 98%; height: 550px; margin: 15px auto; border-radius: 12px; overflow: hidden; border: 1px solid #333; box-shadow: 0 0 15px #111; }
        .thinking { border-color: #ff3c00 !important; box-shadow: 0 0 35px #ff3c00 !important; color: #ff3c00 !important; }
        .listening { border-color: #fff !important; box-shadow: 0 0 35px #fff !important; color: #fff !important; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; letter-spacing: 3px; font-style: italic;">🦅 GARUDA AI MARKET 2.0</h2>
    </div>

    <div class="orb" id="orb">READY</div>

    <button class="btn-mic" onclick="startGaruda()">SAY COMMAND</button>

    <div id="res-box">
        <div id="msg">> System Online. Ready for Neeraj.</div>
    </div>

    <div id="chart">
        <div id="tv_chart"></div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // 1. TradingView Widget
        new TradingView.widget({
            "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "15",
            "theme": "dark", "style": "1", "locale": "in", "container_id": "tv_chart",
            "allow_symbol_change": true
        });

        // 2. API Key Fixed
        const KEY = "AIzaSyDKGIZzvE879788VUEERARohpxgoLHgQIc";

        async function startGaruda() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { 
                alert("Bhai, Chrome Browser use karo!"); 
                return; 
            }
            
            const rec = new SpeechRecognition();
            rec.lang = 'hi-IN';

            const orb = document.getElementById('orb');
            const msgBox = document.getElementById('msg');

            rec.onstart = () => { 
                orb.innerText = "LISTENING";
                orb.classList.add('listening');
            };

            rec.onresult = async (e) => {
                const userMsg = e.results[0][0].transcript;
                msgBox.innerText = "> Neeraj: " + userMsg;
                
                orb.classList.remove('listening');
                orb.innerText = "THINKING";
                orb.classList.add('thinking');

                try {
                    // Using Stable v1 / gemini-pro (Will not give 'not found' error)
                    const r = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: "Tum Neeraj ke assistant Garuda AI ho. Chhota hindi reply do: " + userMsg }] }] })
                    });
                    
                    const d = await r.json();
                    
                    if (d.error) {
                        msgBox.innerText = "> API Error: " + d.error.message;
                        orb.innerText = "ERROR";
                        orb.classList.remove('thinking');
                        return;
                    }

                    const reply = d.candidates[0].content.parts[0].text;
                    msgBox.innerText = "> Garuda: " + reply;
                    orb.innerText = "SPEAKING";
                    orb.classList.remove('thinking');
                    orb.style.borderColor = "#00f2ff";

                    // Voice output
                    const ut = new SpeechSynthesisUtterance(reply);
                    ut.lang = 'hi-IN';
                    window.speechSynthesis.speak(ut);
                    
                    setTimeout(() => { orb.innerText = "READY"; }, 5000);
                } catch (err) {
                    msgBox.innerText = "> Connection Error.";
                    orb.innerText = "RETRY";
                    orb.classList.remove('thinking');
                }
            };
            rec.start();
        }
    </script>
</body>
</html>
